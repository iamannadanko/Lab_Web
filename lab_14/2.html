<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2 - Full Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 1. Налаштування висоти сторінки */
        html, body {
            height: 100%;
            margin: 0;
            overflow-x: hidden; /* Запобігає появі горизонтальної смуги прокрутки */
        }

        /* 2. Контейнер на всю ширину і висоту */
        .full-screen-wrapper {
            min-height: 100vh; /* 100% висоти екрану */
            display: flex;
            flex-direction: column;
        }

        /* 3. Рядок розтягується на весь вільний простір */
        .row-stretch {
            flex-grow: 1;
        }

        /* Стилі блоків */
        .my-block {
            border: 1px solid silver; /* Вимога: рамка 1px */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            /* Висота регулюється автоматично flexbox-ом */
        }

        .sub-text {
            font-size: 1rem;
            font-weight: normal;
        }

        /* Кольори */
        .bg-blue { background-color: #4472c4; }   
        .bg-yellow { background-color: #ffc000; } 
        .bg-red { background-color: #c00000; }    
    </style>
</head>
<body>

    <div class="container-fluid p-0 full-screen-wrapper">
        
        <div class="row g-0 row-stretch">
            
            <div class="col-12 col-md-12 col-lg-8 col-xl-6 my-block bg-blue">
                #1
                <span class="sub-text d-none d-xl-block">6 колонок</span>
                <span class="sub-text d-none d-lg-block d-xl-none">8 колонок</span>
                <span class="sub-text d-block d-lg-none">12 колонок</span>
            </div>

            <div class="col-12 col-md-6 col-lg-4 col-xl-3 my-block bg-yellow">
                #2
                <span class="sub-text d-none d-xl-block">3 колонки</span>
                <span class="sub-text d-none d-lg-block d-xl-none">4 колонки</span>
                <span class="sub-text d-none d-md-block d-lg-none">6 колонок</span>
                <span class="sub-text d-block d-md-none">12 колонок</span>
            </div>

            <div class="col-12 col-md-6 col-lg-12 col-xl-3 my-block bg-red">
                #3
                <span class="sub-text d-none d-xl-block">3 колонки</span>
                <span class="sub-text d-none d-lg-block d-xl-none">12 колонок</span>
                <span class="sub-text d-none d-md-block d-lg-none">6 колонок</span>
                <span class="sub-text d-block d-md-none">12 колонок</span>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
